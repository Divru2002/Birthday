<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Panda ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #ffdde1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      flex-direction: column;
    }

    /* Floating hearts background */
    .floating-heart {
      position: absolute;
      font-size: 2em;
      color: rgba(255,0,0,0.7);
      animation: floatUp 8s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    .heart {
      width: 220px;
      height: 220px;
      background: red;
      position: relative;
      transform: rotate(-45deg);
      cursor: pointer;
      transition: transform 1s ease;
      z-index: 2;
      animation: pulse 1.5s infinite;
    }
    .heart:before,
    .heart:after {
      content: "";
      width: 220px;
      height: 220px;
      background: red;
      border-radius: 50%;
      position: absolute;
    }
    .heart:before { top: -110px; left: 0; }
    .heart:after { left: 110px; top: 0; }

    .heart-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      color: #fff;
      text-align: center;
      font-size: 1.4em;
      font-weight: bold;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
      width: 80%;
      z-index: 3;
    }

    .birthday {
      text-align: center;
      font-size: 2em;
      color: #b30000;
      animation: fadeIn 2s ease forwards;
      z-index: 2;
    }
    .hidden { display: none; }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes pulse {
      0% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.1); }
      100% { transform: rotate(-45deg) scale(1); }
    }

    /* Confetti styling */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background-color: red;
      top: 0;
      animation: fall 3s linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    /* Replay button */
    .replay-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1.2em;
      background: #ff69b4;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: background 0.3s ease;
    }
    .replay-btn:hover {
      background: #ff1493;
    }
  </style>
</head>
<body>
  <!-- Background music -->
  <audio id="bg-music" autoplay loop>
    <source src="romantic.mp3" type="audio/mpeg">
    <!-- Place your romantic instrumental MP3 file named romantic.mp3 in the same folder -->
  </audio>

  <!-- Floating hearts -->
  <div class="floating-heart" style="left:10%; animation-delay:0s;">❤️</div>
  <div class="floating-heart" style="left:30%; animation-delay:2s;">💖</div>
  <div class="floating-heart" style="left:50%; animation-delay:4s;">💕</div>
  <div class="floating-heart" style="left:70%; animation-delay:1s;">💓</div>
  <div class="floating-heart" style="left:85%; animation-delay:3s;">💞</div>

  <!-- Main heart -->
  <div class="heart" id="heart">
    <div class="heart-text">
      Tap to enter<br>in my heart ❤️
    </div>
  </div>

  <!-- Birthday message -->
  <div class="birthday hidden" id="birthday">
    <h1>🎉 Happy Birthday Panda 🎉</h1>
    <p>You are the most special part of my life, and today I celebrate you with all my love. 💕</p>
    <button class="replay-btn" id="replay">Replay Magic ✨</button>
  </div>

  <script>
    const heart = document.getElementById('heart');
    const birthday = document.getElementById('birthday');
    const replayBtn = document.getElementById('replay');
    const music = document.getElementById('bg-music');

    heart.addEventListener('click', () => {
      heart.style.animation = 'none';
      heart.style.transform = 'scale(0)';
      setTimeout(() => {
        heart.style.display = 'none';
        birthday.classList.remove('hidden');
        launchConfetti();
      }, 1000);
    });

    replayBtn.addEventListener('click', () => {
      birthday.classList.add('hidden');
      heart.style.display = 'block';
      heart.style.transform = 'rotate(-45deg) scale(1)';
      heart.style.animation = 'pulse 1.5s infinite';
      launchConfetti();
      music.currentTime = 0; // restart music
      music.play();
    });

    function launchConfetti() {
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.backgroundColor = randomColor();
        confetti.style.animationDelay = Math.random() * 2 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }
    }

    function randomColor() {
      const colors = ['#ff0000','#ff69b4','#ffd700','#00ced1','#32cd32','#ff4500'];
      return colors[Math.floor(Math.random() * colors.length)];
    }
  </script>
</body>
</html>
